services:
  - type: web
    name: re-puestos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: COOKIE_SECRET
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOAD_CSV_ON_START
        value: "true"
